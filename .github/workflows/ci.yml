name: CI

on:
  push:
    branches: [main, "phase*/*", "fix/*", "infra/*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy + Test + Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 34e11487

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libelf-dev zlib1g-dev graphviz

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.94.0
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2 # 42dc69e1

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check (bpf feature)
        run: cargo check --features bpf

      - name: cargo clippy (bpf feature)
        run: cargo clippy --all-targets --features bpf -- -D warnings

      - name: cargo test
        run: cargo test

      - name: proptest (10K graphs)
        run: cargo test --test property_tests -- --test-threads=1

      - name: differential (Rust vs Python)
        run: cargo test --test differential

      - name: bench compile check
        run: cargo bench --no-run

  coverage:
    name: Coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 34e11487

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.94.0
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2 # 42dc69e1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4 # ea165f8d
        with:
          name: coverage-report
          path: lcov.info

      - name: Coverage summary
        run: cargo llvm-cov report

  supply-chain:
    name: Supply Chain (cargo-deny + cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 34e11487

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2 # 82eb9f62

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.94.0

      - uses: Swatinem/rust-cache@v2 # 42dc69e1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

  mutants:
    name: Mutation Testing (≥90% kill rate)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4 # 34e11487

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: 1.94.0

      - uses: Swatinem/rust-cache@v2 # 42dc69e1

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run cargo-mutants
        continue-on-error: true
        run: cargo mutants --timeout=120 -j 4

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4 # ea165f8d
        with:
          name: mutants-report
          path: mutants.out/

      - name: Verify ≥90% kill rate
        run: |
          caught=$(wc -l < mutants.out/caught.txt)
          missed=$(wc -l < mutants.out/missed.txt)
          total=$((caught + missed))
          rate=$(( (caught * 100) / total ))
          echo "Kill rate: ${caught}/${total} = ${rate}%"
          if [ "$rate" -lt 90 ]; then
            echo "FAIL: kill rate ${rate}% < 90% threshold"
            exit 1
          fi
