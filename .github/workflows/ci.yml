name: CI

on:
  push:
    branches: [main, "phase*/*", "fix/*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy + Test + Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verify toolchain components
        run: rustup component add rustfmt clippy 2>/dev/null || true

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy -- -D warnings

      - name: cargo test
        run: cargo test

      - name: proptest (10K graphs)
        run: cargo test --test property_tests -- --test-threads=1

      - name: differential (Rust vs Python)
        run: cargo test --test differential
