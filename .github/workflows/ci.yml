name: CI

on:
  push:
    branches: [main, "phase*/*", "fix/*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Clippy + Test + Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

      - name: proptest (10K graphs)
        run: cargo test --test property_tests -- --test-threads=1

      - name: differential (Rust vs Python)
        run: cargo test --test differential

  mutants:
    name: Mutation Testing (≥90% kill rate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run cargo-mutants
        continue-on-error: true
        run: cargo mutants --timeout=300 -j 2

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants.out/

      - name: Verify ≥90% kill rate
        run: |
          caught=$(wc -l < mutants.out/caught.txt)
          missed=$(wc -l < mutants.out/missed.txt)
          total=$((caught + missed))
          rate=$(( (caught * 100) / total ))
          echo "Kill rate: ${caught}/${total} = ${rate}%"
          if [ "$rate" -lt 90 ]; then
            echo "FAIL: kill rate ${rate}% < 90% threshold"
            exit 1
          fi
