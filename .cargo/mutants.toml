# cargo-mutants configuration
# See https://mutants.rs/mutants-toml.html

# Exclude BPF-gated functions from mutation testing.
#
# These functions require root + BPF privileges to test (libbpf-rs syscalls,
# kernel tracepoints). CI runs cargo-mutants without --features bpf, so
# BPF-gated code paths produce false MISSED results.
#
# Categories:
# 1. Probe functions (cfg(feature = "bpf") stubs vs real implementations)
# 2. Record pipeline (record_impl, poll_ringbuf, poll_perfarray, global_tgid)
#    — require BPF skeleton attach + kernel tracepoints
#
# Re-evaluate when adding --features bpf to the mutation testing job.
exclude_re = [
    "probe_ringbuf",
    "probe_bpf_loop",
    "probe_tp_btf",
    "probe_fentry",
    "record_impl",
    "poll_ringbuf",
    "poll_perfarray",
    "global_tgid",
    "register_signal_handlers",
]
