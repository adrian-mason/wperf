# cargo-mutants configuration
# See https://mutants.rs/mutants-toml.html

# Exclude BPF-gated functions from mutation testing.
#
# These functions require root + BPF privileges to test (libbpf-rs syscalls,
# kernel tracepoints). CI runs cargo-mutants without --features bpf, so
# BPF-gated code paths produce false MISSED results.
#
# Categories:
# 1. Probe functions (cfg(feature = "bpf") stubs vs real implementations)
# 2. Record pipeline (record_impl, poll_ringbuf, poll_perfarray, global_tgid)
#    — require BPF skeleton attach + kernel tracepoints
#
# Re-evaluate when adding --features bpf to the mutation testing job.
exclude_re = [
    "probe_ringbuf",
    "probe_bpf_loop",
    "probe_tp_btf",
    "probe_fentry",
    # Phase 2b #38 P2b-01 (commit-2): block_rq BTF arity probe + helpers.
    # All cfg(feature = "bpf")-gated, require BTF + libbpf to exercise.
    "probe_block_rq_issue_single_arg",
    "btf_typedef_func_proto_vlen",
    "btf_kind",
    "btf_vlen",
    "kernel_version_ge",
    "BtfGuard",
    # Equivalent mutant: `|` vs `^` are indistinguishable when operands
    # occupy disjoint bit regions. WperfEvent::io_sector packs prev_tid
    # (lower 32 bits) with next_tid << 32 (upper 32 bits) — by construction
    # the bit regions never overlap, so `|` → `^` has no observable effect.
    "WperfEvent::io_sector",
    "record_impl",
    "poll_ringbuf",
    "poll_perfarray",
    "global_tgid",
]
